spring:
  config:
    import: "aws-parameterstore:/cloud-project-app/prod/"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    aws:
      s3:
        bucket: ${S3_BUCKET_NAME}
      region:
        static: ap-northeast-2


#management:
#  endpoint:
#    health:
#      show-details: never
#  info:
#    env:
#      enabled: true
#info:
#  team-name: ${team-name:Default-Team}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

info:
  team-name: ${team-name:Default-Team}
  app:
    name: "project-cloud"
    description: "spring boot aws practice"
    version: "0.0.1-SNAPSHOT"
logging:
  level:
    root: INFO


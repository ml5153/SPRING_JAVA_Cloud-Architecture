# 수정11 (ARM64 이미지 빌드)
name: Deploy to EC2 with Docker Hub

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 목적: 저장소 체크아웃
      # 수정: Node 24 대응 버전으로 변경
      - name: Checkout
        uses: actions/checkout@v5

      # 목적: Java 17 + Gradle 캐시 설정
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 목적: gradlew 실행 권한 부여
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # 목적: 테스트 실행
      - name: Run tests
        run: ./gradlew test

      # 목적: Spring Boot JAR 생성
      - name: Build bootJar
        run: ./gradlew bootJar

      # 목적: Dockerfile이 사용할 app.jar 준비
      - name: Prepare JAR
        run: |
          JAR_FILE=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*plain.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "JAR 파일을 찾지 못했습니다."
            exit 1
          fi

          cp "$JAR_FILE" app.jar
          ls -lh app.jar

      # 수정: ARM64 이미지 빌드를 위해 QEMU 추가
      # 수정: setup-qemu-action은 setup-buildx-action보다 먼저 두는 것이 권장됨
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # 목적: Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 목적: Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 목적: Docker 이미지 빌드 및 Docker Hub 푸시
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # 수정: EC2가 ARM64이므로 멀티 아키텍처 이미지로 빌드
          # 수정: amd64 + arm64 둘 다 포함한 매니페스트 생성
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:latest
            ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 목적: EC2에 접속해 최신 이미지 pull 후 컨테이너 교체
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          envs: IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            # 수정: 중간 실패 시 즉시 종료
            set -euo pipefail

            # 수정: OS 정보 확인
            if [ -f /etc/os-release ]; then
              . /etc/os-release
            fi

            # 수정: Docker가 없으면 OS별로 자동 설치
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker가 없어서 설치를 진행합니다."

              # 수정: Amazon Linux 2
              if [ "${ID:-}" = "amzn" ] && [ "${VERSION_ID:-}" = "2" ]; then
                sudo yum update -y
                sudo amazon-linux-extras install docker -y

              # 수정: Amazon Linux 2023
              elif [ "${ID:-}" = "amzn" ]; then
                sudo yum update -y
                sudo yum install -y docker

              # 수정: Ubuntu
              elif [ "${ID:-}" = "ubuntu" ]; then
                sudo apt-get update -y
                sudo apt-get install -y docker.io

              # 수정: 그 외 OS는 실패 처리
              else
                echo "지원하지 않는 OS입니다. ID=${ID:-unknown}, VERSION_ID=${VERSION_ID:-unknown}"
                exit 1
              fi
            fi

            # 수정: Docker 서비스 활성화 및 시작
            sudo systemctl enable docker || true
            sudo systemctl start docker || sudo service docker start

            # 수정: Docker Hub 로그인
            echo "$DOCKERHUB_TOKEN" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            # 수정: 최신 이미지 pull
            sudo docker pull "$IMAGE"

            # 수정: 기존 컨테이너 중지 및 삭제
            sudo docker stop cloud-demo || true
            sudo docker rm cloud-demo || true

            # 수정: 새 컨테이너 실행
            sudo docker run -d \
              --name cloud-demo \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              "$IMAGE"

            # 수정: 배포 결과 확인
            sudo docker ps
            sudo docker logs --tail 50 cloud-demo || true
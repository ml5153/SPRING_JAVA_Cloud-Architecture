name: Deploy to EC2 # 로봇의 이름

on:
  push:
    branches: [ "main" ] # "main 브랜치에 코드 들어오면 시작해!"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3 # 코드를 가져온다

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew clean build -x test # 코드를 빌드해서 jar를 만든다

      - name: Login to Docker Hub
        uses: docker/login-action@v2 # 도커 허브 로그인
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: | # 박스를 만들고 창고(Docker Hub)에 보낸다
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/project-cloud .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/project-cloud

      - name: EC2 Deploy
        uses: appleboy/ssh-action@master # EC2에 접속해서 명령어를 대신 친다
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/project-cloud
            sudo docker stop project-cloud || true
            sudo docker rm project-cloud || true
            sudo docker run -d -p 8080:8080 --name project-cloud ${{ secrets.DOCKERHUB_USERNAME }}/project-cloud
name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2 # <--- 멀티 플랫폼 빌드를 위한 도구 설정

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4 # <--- 공식 액션 사용
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64 # <--- 서버 규격 명시
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/project-cloud:latest

      - name: EC2 Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/project-cloud:latest
            sudo docker stop project-cloud || true
            sudo docker rm project-cloud || true
            sudo docker run -d -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              --name project-cloud ${{ secrets.DOCKERHUB_USERNAME }}/project-cloud:latest